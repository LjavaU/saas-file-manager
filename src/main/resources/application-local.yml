spring:
  servlet:
    multipart:
      max-file-size: 10240MB
      max-request-size: 10240MB
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:26379}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1.0.0

sup:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saas-file}?characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:change_me}
  log:
    addr: http://localhost:8080
    remote:
      enabled: false
  schedule:
    username: admin
    password: ${XXL_JOB_PASSWORD:change_me}
    addresses: ${XXL_JOB_ADDRESS:localhost:8080/xxl-job-admin}
    executor:
      address: ${XXL_JOB_EXECUTOR_ADDRESS:http://127.0.0.1:9998}
      appName: saas-file-manager
  tenant:
    dt: 0
    enabled: true
    db.enabled: true
    http.enabled: true
  websocket:
    path: /supWs
    session-key-options:
      enabled: true
      type: user
    globalSend: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:change_me}
  bucket: ${MINIO_BUCKET:recommend}

feign:
  okhttp:
    enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

service:
  llm:
    address: ${LLM_SERVICE_ADDRESS:http://localhost:18080}
  dataHub:
    address: ${DATAHUB_SERVICE_ADDRESS:http://localhost:18081}
  tempLabel:
    address: ${TEMP_LABEL_SERVICE_ADDRESS:http://localhost:18082}
  autoSupervision:
    address: ${AUTO_SUPERVISION_SERVICE_ADDRESS:http://localhost:18083}
  pid:
    address: ${PID_SERVICE_ADDRESS:http://localhost:18084}
  index:
    address: ${INDEX_SERVICE_ADDRESS:http://localhost:18085}
  knowledge:
    address: ${KNOWLEDGE_SERVICE_ADDRESS:http://localhost:18086}

file:
  temp-dir: ${FILE_TEMP_DIR:D:/temp/uploads}

app:
  security:
    jwt-download-secret: ${JWT_DOWNLOAD_SECRET:local-dev-only-change-me}
